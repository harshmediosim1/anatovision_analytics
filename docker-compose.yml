version: '3.8'

services:
  db:
    image: postgres:13
    container_name: cadaviz_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cadaviz_analytics
      POSTGRES_PASSWORD: cadaviz_analytics
      POSTGRES_DB: cadaviz_analytics_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
    driver: local
