user  nobody;
worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # HTTP server block to redirect traffic to HTTPS
    server {
        listen 8080;
        server_name 43.204.125.60 analytics.cadaviz.com www.analytics.cadaviz.com;

        # Redirect all traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server block for SSL
    server {
        listen 8443 ssl;
        server_name 43.204.125.60 analytics.cadaviz.com www.analytics.cadaviz.com;

        # SSL certificate and key
        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/private.key;

        # SSL configuration for strong security
        ssl_session_cache    shared:SSL:1m;
        ssl_session_timeout  5m;
        ssl_ciphers  HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers  on;

        # Main location for Flask app

    location / {
        proxy_pass http://cadaviz_dash:8050;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /unity/api/data {
        proxy_pass http://cadaviz_web:5000/unity/api/data;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ai/analytics/data {
        proxy_pass http://cadaviz_web:5000/ai/analytics/data;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    } 

    location /admin {
        proxy_pass http://cadaviz_web:5000/admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    }

    # Additional security headers (optional)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
